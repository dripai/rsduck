<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>rsduck console</title>
<style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body { font-family: "Segoe UI", Arial, sans-serif; color: #1f2933; background: #fff; overflow: hidden; }
button, input, textarea { font: inherit; }
.auth-screen { position: fixed; inset: 0; display: grid; place-items: center; background: #eef2f7; z-index: 20; }
.auth-screen[hidden] { display: none; }
.login-card { width: min(360px, calc(100vw - 32px)); padding: 26px; border: 1px solid #d4dbe6; border-radius: 8px; background: #fff; box-shadow: 0 16px 42px rgba(15, 23, 42, .14); }
.login-title { font-size: 20px; font-weight: 700; margin-bottom: 18px; }
.login-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 13px; color: #334155; font-size: 13px; }
.login-field input { height: 34px; padding: 5px 9px; border: 1px solid #b9c4d3; border-radius: 4px; background: #fff; }
.login-field input:focus { outline: 2px solid #8fc2ff; border-color: #1a73e8; }
.login-actions { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-top: 18px; }
.login-error { min-height: 18px; color: #b42318; font-size: 13px; }
.app { display: grid; grid-template-columns: 300px minmax(0, 1fr); height: 100vh; }
.app[hidden] { display: none; }
.sidebar { min-width: 0; border-right: 1px solid #d8dde6; background: #f7f9fc; display: flex; flex-direction: column; }
.brand { height: 44px; display: flex; align-items: center; padding: 0 14px; font-weight: 700; border-bottom: 1px solid #d8dde6; background: #fff; }
.db-node { padding: 10px 12px 8px; border-bottom: 1px solid #e3e7ee; }
.db-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 7px; }
.db-title::before { content: ""; width: 12px; height: 12px; border-radius: 3px; background: #0f9f6e; display: inline-block; }
.schema-tools { display: flex; gap: 6px; margin-top: 9px; }
.schema-tools input { min-width: 0; flex: 1; height: 28px; padding: 4px 8px; border: 1px solid #c8d0dc; border-radius: 4px; background: #fff; font-size: 12px; }
.icon-button { height: 28px; padding: 0 9px; border: 1px solid #b9c4d3; border-radius: 4px; background: #fff; color: #334155; cursor: pointer; font-size: 12px; }
.icon-button:hover { background: #edf4ff; border-color: #7daeea; }
.schema-actions { display: flex; margin-top: 7px; }
.parquet-import-button { display: inline-flex; align-items: center; justify-content: center; gap: 6px; width: 100%; height: 29px; padding: 0 10px; border: 1px solid #93a4b8; border-radius: 4px; color: #263445; background: #fff; cursor: pointer; font-size: 12px; }
.parquet-import-button:hover { color: #0b61c9; border-color: #6f9fd8; background: #edf4ff; }
.parquet-import-button:focus-visible { outline: 2px solid #1a73e8; outline-offset: 1px; }
.tree { overflow: auto; padding: 6px 0 12px; flex: 1; }
.schema-group { margin: 2px 0 8px; }
.schema-name { padding: 5px 12px; color: #526172; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
.table-row { width: 100%; display: grid; grid-template-columns: 18px minmax(0, 1fr) auto; align-items: center; gap: 6px; border: 0; background: transparent; color: #1f2933; text-align: left; padding: 4px 10px 4px 18px; cursor: pointer; font-size: 13px; }
.table-row:hover { background: #e8f2ff; }
.table-row.active { background: #cfe6ff; outline: 1px solid #59a8ff; outline-offset: -1px; }
.table-icon { width: 13px; height: 12px; border: 1px solid #5aa2d8; background: linear-gradient(#9fd4ff 0 35%, #4da3df 35% 100%); border-radius: 2px; }
.table-name { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.table-meta { color: #708090; font-size: 11px; }
.empty { color: #66758a; padding: 14px; font-size: 13px; }
.main { --editor-height: 38vh; min-width: 0; display: grid; grid-template-rows: 44px minmax(150px, var(--editor-height)) 8px auto minmax(0, 1fr); height: 100vh; }
.topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; height: 44px; padding: 0 14px; border-bottom: 1px solid #d8dde6; background: #f9fafb; }
.title { font-weight: 700; }
.top-actions { display: flex; align-items: center; gap: 12px; min-width: 0; }
.session-meta { display: flex; align-items: center; gap: 8px; min-width: 0; }
.summary { color: #66758a; font-size: 12px; white-space: nowrap; }
.user-pill { max-width: 120px; overflow: hidden; padding: 3px 7px; border: 1px solid #d8dde6; border-radius: 4px; color: #334155; background: #eef2f6; font-size: 12px; line-height: 18px; white-space: nowrap; text-overflow: ellipsis; }
.action-toolbar { display: inline-flex; align-items: stretch; overflow: hidden; flex: none; height: 32px; border: 1px solid #b9c4d3; border-radius: 6px; background: #fff; box-shadow: 0 1px 2px rgba(15, 23, 42, .08); }
.toolbar-button { display: inline-flex; align-items: center; justify-content: center; gap: 6px; min-width: 0; height: 30px; padding: 0 10px; border: 0; border-left: 1px solid #d8dde6; color: #263445; background: #fff; cursor: pointer; font: inherit; font-size: 12px; white-space: nowrap; }
.toolbar-button:first-child { border-left: 0; }
.toolbar-button:hover { color: #0b61c9; background: #edf4ff; }
.toolbar-button.logout-button:hover { color: #b42318; background: #fff1f0; }
.toolbar-button:focus-visible { position: relative; z-index: 1; outline: 2px solid #1a73e8; outline-offset: -2px; }
.toolbar-button:disabled { color: #8995a5; background: #f4f6f8; cursor: wait; }
.toolbar-icon { width: 14px; color: currentColor; font-size: 15px; line-height: 1; text-align: center; }
.editor { min-height: 0; display: flex; flex-direction: column; border-bottom: 1px solid #d8dde6; }
.editor-surface { flex: 1; min-height: 130px; background: #fff; overflow: hidden; }
.editor-surface .cm-editor { height: 100%; }
.editor-surface .cm-focused { outline: none; }
.editor-surface .cm-selectionBackground { background: #7fb3ff !important; }
.editor-surface .cm-line::selection,
.editor-surface .cm-line *::selection,
.editor-surface .cm-content::selection,
.editor-surface .cm-content *::selection { background: #7fb3ff !important; color: inherit !important; }
.toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-top: 1px solid #e6e9ef; background: #f4f6f8; }
.context-menu { position: fixed; z-index: 1000; min-width: 150px; padding: 4px; border: 1px solid #b9c4d3; border-radius: 4px; background: #fff; box-shadow: 0 8px 24px rgba(15, 23, 42, .18); }
.context-menu[hidden] { display: none; }
.context-menu button { width: 100%; height: 30px; border: 0; border-radius: 3px; background: transparent; color: #1f2933; text-align: left; padding: 0 10px; cursor: pointer; }
.context-menu button:hover { background: #edf4ff; color: #0b61c9; }
.splitter { height: 8px; cursor: row-resize; background: #f4f6f8; border-top: 1px solid #d8dde6; border-bottom: 1px solid #d8dde6; position: relative; }
.splitter::before { content: ""; position: absolute; left: 12px; right: 12px; top: 3px; height: 2px; border-radius: 1px; background: #b8c2d1; }
.splitter:hover, .splitter.dragging { background: #eaf2ff; }
.splitter:hover::before, .splitter.dragging::before { background: #5b9ee8; }
body.resizing { cursor: row-resize; user-select: none; }
.primary-button { height: 30px; padding: 0 14px; border: 1px solid #1565c0; border-radius: 4px; color: #fff; background: #1a73e8; cursor: pointer; }
.primary-button:hover { background: #1558b0; }
.secondary-button { height: 30px; padding: 0 12px; border: 1px solid #b9c4d3; border-radius: 4px; color: #263445; background: #fff; cursor: pointer; }
.secondary-button:hover { background: #edf4ff; border-color: #7daeea; }
.pager { display: flex; gap: 8px; align-items: center; padding: 7px 12px; border-bottom: 1px solid #d8dde6; background: #fff; color: #475569; font-size: 13px; }
.pager input { width: 96px; height: 28px; padding: 4px 7px; border: 1px solid #c8d0dc; border-radius: 4px; }
.status { min-width: 0; margin-left: auto; color: #66758a; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.result { min-width: 0; min-height: 0; overflow: auto; background: #fff; }
.explain-result { padding: 12px; }
.explain-card { border: 1px solid #d8dde6; border-radius: 5px; overflow: auto; }
.explain-label { padding: 7px 10px; border-bottom: 1px solid #d8dde6; color: #475569; background: #f8fafc; font-size: 12px; font-weight: 700; }
.explain-plan { margin: 0; padding: 12px; color: #1f2937; background: #fff; font: 12px/1.45 Consolas, "Courier New", monospace; white-space: pre; tab-size: 2; }
table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { border-right: 1px solid #e1e5eb; border-bottom: 1px solid #e1e5eb; padding: 6px 9px; text-align: left; white-space: nowrap; }
th { position: sticky; top: 0; background: #f3f5f7; color: #111827; z-index: 1; }
td { color: #253244; }
tbody tr:nth-child(even) { background: #fafbfc; }
.modal-backdrop { position: fixed; inset: 0; z-index: 30; display: grid; place-items: center; padding: 18px; background: rgba(15, 23, 42, .38); }
.modal-backdrop[hidden] { display: none; }
.dialog { width: min(480px, 100%); border: 1px solid #c5ceda; border-radius: 8px; background: #fff; box-shadow: 0 18px 50px rgba(15, 23, 42, .22); }
.dialog-header { display: flex; align-items: center; justify-content: space-between; height: 44px; padding: 0 14px 0 16px; border-bottom: 1px solid #e1e5eb; }
.dialog-title { font-size: 15px; font-weight: 700; }
.dialog-close { width: 28px; height: 28px; padding: 0; border: 0; border-radius: 4px; color: #526172; background: transparent; cursor: pointer; font-size: 19px; line-height: 1; }
.dialog-close:hover { color: #b42318; background: #fff1f0; }
.dialog-body { padding: 15px 16px 4px; }
.dialog-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; color: #334155; font-size: 12px; }
.dialog-field input { width: 100%; height: 32px; padding: 5px 8px; border: 1px solid #b9c4d3; border-radius: 4px; background: #fff; }
.dialog-field input:focus { outline: 2px solid #8fc2ff; border-color: #1a73e8; }
.dialog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.parquet-import-root { overflow-wrap: anywhere; margin-bottom: 12px; padding: 7px 8px; border: 1px solid #d8dde6; border-radius: 4px; color: #526172; background: #f4f6f8; font: 12px Consolas, monospace; }
.dialog-error { min-height: 18px; color: #b42318; font-size: 12px; }
.dialog-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 16px 15px; }
.primary-button:disabled, .secondary-button:disabled { color: #8995a5; border-color: #c8d0dc; background: #eef1f4; cursor: wait; }
@media (max-width: 760px) {
  body { overflow: auto; }
  .app { grid-template-columns: 1fr; grid-template-rows: 240px 1fr; height: auto; min-height: 100vh; }
  .sidebar { border-right: 0; border-bottom: 1px solid #d8dde6; }
  .main { height: calc(100vh - 240px); min-height: 520px; }
  .summary { display: none; }
}
@media (max-width: 520px) {
  .topbar { gap: 8px; padding: 0 8px; }
  .session-meta { display: none; }
  .toolbar-button { padding: 0 8px; }
  .dialog-grid { grid-template-columns: 1fr; gap: 0; }
}
</style>
</head>
<body>
<div id="authScreen" class="auth-screen">
  <form class="login-card" onsubmit="login(event)">
    <div class="login-title">rsduck</div>
    <label class="login-field">
      <span>Username</span>
      <input id="loginUsername" autocomplete="username" autofocus>
    </label>
    <label class="login-field">
      <span>Password</span>
      <input id="loginPassword" type="password" autocomplete="current-password">
    </label>
    <div id="loginMsg" class="login-error"></div>
    <div class="login-actions">
      <button class="primary-button" type="submit">Sign in</button>
    </div>
  </form>
</div>
<div id="app" class="app" hidden>
  <aside class="sidebar">
    <div class="brand">rsduck</div>
    <div class="db-node">
      <div class="db-title">memory</div>
      <div class="schema-tools">
        <input id="tableFilter" placeholder="Filter tables" oninput="renderTables()">
        <button class="icon-button" onclick="loadTables()" title="Refresh tables">Refresh</button>
      </div>
      <div class="schema-actions">
        <button class="parquet-import-button" type="button" onclick="openParquetImportDialog()" title="Import Parquet tables">
          <span aria-hidden="true">&#8681;</span>
          <span>Import Parquet</span>
        </button>
      </div>
    </div>
    <div id="tableList" class="tree"><div class="empty">Loading tables...</div></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="title">SQL Console</div>
      <div class="top-actions">
        <div class="session-meta">
          <div id="schemaSummary" class="summary">0 tables</div>
          <span id="currentUser" class="user-pill"></span>
        </div>
        <div class="action-toolbar" role="toolbar" aria-label="Session actions">
          <button id="snapshotButton" class="toolbar-button" type="button" onclick="saveSnapshot()" title="Save snapshot">
            <span class="toolbar-icon" aria-hidden="true">&#8595;</span>
            <span>Save Snapshot</span>
          </button>
          <button class="toolbar-button logout-button" type="button" onclick="logout()" title="Log out">
            <span class="toolbar-icon" aria-hidden="true">&#8677;</span>
            <span>Logout</span>
          </button>
        </div>
      </div>
    </div>
    <section class="editor">
      <div id="sqlEditor" class="editor-surface"></div>
      <div class="toolbar">
        <button class="primary-button" onclick="run()">Execute</button>
      </div>
    </section>
    <div id="editorSplitter" class="splitter" title="Drag to resize editor"></div>
    <div class="pager">
      <button class="secondary-button" onclick="prevPage()">Prev</button>
      <span id="pageLabel">Page 1</span>
      <button class="secondary-button" onclick="nextPage()">Next</button>
      <span>Page size</span>
      <input id="pageSize" type="number" min="1" max="100000" value="100">
      <span id="msg" class="status"></span>
    </div>
    <section class="result">
      <div id="explainResult" class="explain-result" hidden></div>
      <table id="tbl"></table>
    </section>
  </main>
</div>
<div id="parquetImportDialog" class="modal-backdrop" hidden onclick="closeParquetImportFromBackdrop(event)">
  <form class="dialog" role="dialog" aria-modal="true" aria-labelledby="parquetImportTitle" onsubmit="submitParquetImport(event)">
    <div class="dialog-header">
      <div id="parquetImportTitle" class="dialog-title">Import Parquet Tables</div>
      <button class="dialog-close" type="button" onclick="closeParquetImportDialog()" title="Close" aria-label="Close">&#215;</button>
    </div>
    <div class="dialog-body">
      <label class="dialog-field">
        <span>Parquet import root</span>
        <span id="parquetImportRoot" class="parquet-import-root">Loading...</span>
      </label>
      <label class="dialog-field">
        <span>Source path</span>
        <input id="parquetImportSource" value="." required autocomplete="off">
      </label>
      <div class="dialog-grid">
        <label class="dialog-field">
          <span>Target schema</span>
          <input id="parquetImportSchema" value="main" required autocomplete="off">
        </label>
        <label class="dialog-field">
          <span>Target table (single file)</span>
          <input id="parquetImportTable" autocomplete="off">
        </label>
      </div>
      <div id="parquetImportMsg" class="dialog-error" role="alert"></div>
    </div>
    <div class="dialog-actions">
      <button class="secondary-button" type="button" onclick="closeParquetImportDialog()">Cancel</button>
      <button id="parquetImportSubmit" class="primary-button" type="submit">Import</button>
    </div>
  </form>
</div>
<div id="sqlContextMenu" class="context-menu" hidden>
  <button type="button" onclick="executeContextSql()">Execute Selection</button>
</div>
<script src="/assets/codemirror.bundle.js"></script>
<script>
let currentPage = 0;
let lastSql = '';
let tables = [];
let activeTable = '';
let contextSql = '';
let sqlEditor = null;
let currentUser = '';
let uiReady = false;
const editorHeightKey = 'rsduck.editorHeight';
const sqlEditorCacheKey = 'rsduck.sqlConsole.currentSql';

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[ch]));
}

function ensureUiReady() {
  if (uiReady) return;
  setupSqlEditor();
  setupEditorSplitter();
  uiReady = true;
}

function showLogin(message = '') {
  document.getElementById('authScreen').hidden = false;
  document.getElementById('app').hidden = true;
  document.getElementById('loginMsg').innerText = message;
  setTimeout(() => document.getElementById('loginUsername').focus(), 0);
}

function showApp(username) {
  currentUser = username;
  document.getElementById('currentUser').innerText = username;
  document.getElementById('authScreen').hidden = true;
  document.getElementById('app').hidden = false;
  ensureUiReady();
}

async function login(event) {
  event.preventDefault();
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const msg = document.getElementById('loginMsg');
  msg.innerText = '';
  const resp = await fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  const data = await resp.json();
  if (!data.success) {
    msg.innerText = data.msg || 'login failed';
    return;
  }
  document.getElementById('loginPassword').value = '';
  showApp(data.username);
  await loadTables();
}

async function logout() {
  await fetch('/logout', { method: 'POST' });
  tables = [];
  activeTable = '';
  document.getElementById('tbl').innerHTML = '';
  document.getElementById('msg').innerText = '';
  showLogin();
}

async function initSession() {
  const resp = await fetch('/session');
  const data = await resp.json();
  if (!data.authenticated) {
    showLogin();
    return;
  }
  showApp(data.username);
  await loadTables();
}

function loadCachedSql() {
  try {
    return localStorage.getItem(sqlEditorCacheKey) || 'SHOW TABLES;';
  } catch (error) {
    return 'SHOW TABLES;';
  }
}

function saveCachedSql(sql) {
  try {
    localStorage.setItem(sqlEditorCacheKey, sql || '');
  } catch (error) {
    // Ignore localStorage failures so the SQL console still works in restricted browsers.
  }
}

function setSqlValue(value) {
  sqlEditor.setValue(value);
}

function getSqlValue() {
  return sqlEditor ? sqlEditor.getValue() : '';
}

function getSelectedSql() {
  return sqlEditor ? sqlEditor.getSelectedText() : '';
}

function showSqlContextMenu(x, y) {
  const menu = document.getElementById('sqlContextMenu');
  menu.hidden = false;
  const left = Math.min(x, window.innerWidth - menu.offsetWidth - 8);
  const top = Math.min(y, window.innerHeight - menu.offsetHeight - 8);
  menu.style.left = Math.max(8, left) + 'px';
  menu.style.top = Math.max(8, top) + 'px';
}

function hideSqlContextMenu() {
  document.getElementById('sqlContextMenu').hidden = true;
}

function executeContextSql() {
  const sql = contextSql;
  hideSqlContextMenu();
  if (sql) runSqlText(sql, true, { batchSelection: true });
}

function setupSqlEditor() {
  const parent = document.getElementById('sqlEditor');
  sqlEditor = window.RsduckEditor.create({
    parent,
    initialDoc: loadCachedSql(),
    onRun: (sql, meta) => runSqlText(sql, true, { batchSelection: meta?.selected === true }),
    onChange: saveCachedSql
  });

  parent.addEventListener('contextmenu', event => {
    const sql = getSelectedSql();
    if (!sql) {
      hideSqlContextMenu();
      return;
    }
    event.preventDefault();
    contextSql = sql;
    showSqlContextMenu(event.clientX, event.clientY);
  });

  document.addEventListener('click', hideSqlContextMenu);
  window.addEventListener('resize', hideSqlContextMenu);
}

function quoteIdent(value) {
  return '"' + String(value).replace(/"/g, '""') + '"';
}

function tableSql(schema, table) {
  return 'SELECT * FROM ' + quoteIdent(schema) + '.' + quoteIdent(table) + ' LIMIT 100;';
}

function shouldRefreshTables(sql) {
  const cleanSql = sql
    .replace(/\/\*[\s\S]*?\*\//g, ' ')
    .replace(/--.*$/gm, ' ')
    .trim();
  const command = cleanSql.split(/\s+/)[0]?.toUpperCase() || '';
  return ['CREATE', 'DROP', 'ALTER', 'COMMENT', 'IMPORT', 'ATTACH', 'DETACH'].includes(command);
}

function hasExecutableSql(sql) {
  return sql
    .replace(/\/\*[\s\S]*?\*\//g, ' ')
    .replace(/--.*$/gm, ' ')
    .trim()
    .length > 0;
}

function splitSqlStatements(sql) {
  const statements = [];
  let start = 0;
  let state = 'normal';

  for (let i = 0; i < sql.length; i += 1) {
    const ch = sql[i];
    const next = sql[i + 1];

    if (state === 'lineComment') {
      if (ch === '\n' || ch === '\r') state = 'normal';
      continue;
    }

    if (state === 'blockComment') {
      if (ch === '*' && next === '/') {
        i += 1;
        state = 'normal';
      }
      continue;
    }

    if (state === 'singleQuote') {
      if (ch === "'" && next === "'") {
        i += 1;
      } else if (ch === "'") {
        state = 'normal';
      }
      continue;
    }

    if (state === 'doubleQuote') {
      if (ch === '"' && next === '"') {
        i += 1;
      } else if (ch === '"') {
        state = 'normal';
      }
      continue;
    }

    if (state === 'backtick') {
      if (ch === '`' && next === '`') {
        i += 1;
      } else if (ch === '`') {
        state = 'normal';
      }
      continue;
    }

    if (ch === '-' && next === '-') {
      i += 1;
      state = 'lineComment';
      continue;
    }
    if (ch === '/' && next === '*') {
      i += 1;
      state = 'blockComment';
      continue;
    }
    if (ch === "'") {
      state = 'singleQuote';
      continue;
    }
    if (ch === '"') {
      state = 'doubleQuote';
      continue;
    }
    if (ch === '`') {
      state = 'backtick';
      continue;
    }
    if (ch === ';') {
      const statement = sql.slice(start, i).trim();
      if (hasExecutableSql(statement)) statements.push(statement);
      start = i + 1;
    }
  }

  const tail = sql.slice(start).trim();
  if (hasExecutableSql(tail)) statements.push(tail);
  return statements;
}

function sqlSummary(sql) {
  return sql.replace(/\s+/g, ' ').trim().slice(0, 160);
}

async function postSql(sql, page = 0, pageSize = 1000) {
  const resp = await fetch('/sql', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sql, page, page_size: pageSize })
  });
  return await resp.json();
}

async function loadTables(showErrors = true) {
  const sql = `
    SELECT table_schema, table_name, table_type
    FROM information_schema.tables
    WHERE table_schema NOT IN ('pg_catalog', 'information_schema', 'rsduck_catalog', 'rsduck_internal')
    ORDER BY table_schema, table_name
  `;
  const data = await postSql(sql, 0, 10000);
  if (!data.success) {
    if (showErrors) {
      document.getElementById('tableList').innerHTML =
        '<div class="empty">Failed to load tables: ' + escapeHtml(data.msg) + '</div>';
    }
    return;
  }

  const schemaIdx = data.columns.findIndex(c => c.name.toLowerCase() === 'table_schema');
  const tableIdx = data.columns.findIndex(c => c.name.toLowerCase() === 'table_name');
  const typeIdx = data.columns.findIndex(c => c.name.toLowerCase() === 'table_type');

  tables = data.rows.map(row => ({
    schema: row[schemaIdx] || 'main',
    name: row[tableIdx] || '',
    type: typeIdx >= 0 ? row[typeIdx] : ''
  })).filter(item => item.name);

  renderTables();
}

function renderTables() {
  const list = document.getElementById('tableList');
  const summary = document.getElementById('schemaSummary');
  const filter = document.getElementById('tableFilter').value.trim().toLowerCase();
  const visible = tables.filter(item =>
    !filter ||
    item.name.toLowerCase().includes(filter) ||
    item.schema.toLowerCase().includes(filter)
  );

  summary.innerText = tables.length + (tables.length === 1 ? ' table' : ' tables');
  if (!visible.length) {
    list.innerHTML = '<div class="empty">No tables</div>';
    return;
  }

  const groups = new Map();
  for (const item of visible) {
    if (!groups.has(item.schema)) groups.set(item.schema, []);
    groups.get(item.schema).push(item);
  }

  let html = '';
  for (const [schema, items] of groups) {
    html += '<div class="schema-group">';
    html += '<div class="schema-name">' + escapeHtml(schema) + '</div>';
    for (const item of items) {
      const key = item.schema + '.' + item.name;
      const meta = item.type || '';
      html += '<button class="table-row ' + (key === activeTable ? 'active' : '') + '" ';
      html += 'title="' + escapeHtml(key) + '" ';
      html += 'onclick="selectTable(' + escapeHtml(JSON.stringify(item.schema)) + ',' + escapeHtml(JSON.stringify(item.name)) + ')">';
      html += '<span class="table-icon"></span>';
      html += '<span class="table-name">' + escapeHtml(item.name) + '</span>';
      html += '<span class="table-meta">' + escapeHtml(meta) + '</span>';
      html += '</button>';
    }
    html += '</div>';
  }
  list.innerHTML = html;
}

function selectTable(schema, table) {
  activeTable = schema + '.' + table;
  renderTables();
}

async function run(resetPage = true) {
  const selectedSql = getSelectedSql();
  const sql = (selectedSql || getSqlValue()).trim();
  return runSqlText(sql, resetPage, { batchSelection: Boolean(selectedSql) });
}

function renderBatchResult(items) {
  hideExplainResult();
  const tbl = document.getElementById('tbl');
  let html = '<thead><tr><th>#</th><th>Status</th><th>SQL</th><th>Message</th><th>ms</th></tr></thead><tbody>';
  for (const item of items) {
    html += '<tr>';
    html += '<td>' + item.index + '</td>';
    html += '<td>' + escapeHtml(item.success ? 'ok' : 'error') + '</td>';
    html += '<td>' + escapeHtml(item.sql) + '</td>';
    html += '<td>' + escapeHtml(item.message) + '</td>';
    html += '<td>' + escapeHtml(item.ms) + '</td>';
    html += '</tr>';
  }
  html += '</tbody>';
  tbl.innerHTML = html;
}

function isExplainResult(data) {
  return data.columns.length === 2 &&
    data.columns[0].name.toLowerCase() === 'explain_key' &&
    data.columns[1].name.toLowerCase() === 'explain_value';
}

function hideExplainResult() {
  document.getElementById('explainResult').hidden = true;
  document.getElementById('tbl').style.display = '';
}

function renderExplainResult(data) {
  const explainResult = document.getElementById('explainResult');
  let html = '';
  for (const row of data.rows) {
    const label = row[0] || 'plan';
    const plan = row[1] || '';
    html += '<section class="explain-card">';
    html += '<div class="explain-label">' + escapeHtml(label) + '</div>';
    html += '<pre class="explain-plan">' + escapeHtml(plan) + '</pre>';
    html += '</section>';
  }
  explainResult.innerHTML = html;
  explainResult.hidden = false;
  document.getElementById('tbl').style.display = 'none';
}

async function runSqlBatch(statements, pageSize) {
  const msg = document.getElementById('msg');
  const results = [];
  const totalStart = performance.now();
  let shouldRefresh = false;

  document.getElementById('pageLabel').innerText = 'Page 1';
  for (let i = 0; i < statements.length; i += 1) {
    const statement = statements[i];
    msg.innerText = 'Running statement ' + (i + 1) + '/' + statements.length + '...';
    const t0 = performance.now();
    const data = await postSql(statement, 0, pageSize);
    const ms = (performance.now() - t0).toFixed(1);
    const result = {
      index: i + 1,
      success: data.success,
      sql: sqlSummary(statement),
      message: data.success ? data.msg : data.msg,
      ms
    };
    results.push(result);
    renderBatchResult(results);
    if (shouldRefreshTables(statement)) shouldRefresh = true;
    if (!data.success) {
      msg.innerText = 'Error at statement ' + (i + 1) + '/' + statements.length + ': ' + data.msg;
      if (shouldRefresh) loadTables(false);
      return;
    }
  }

  const totalMs = (performance.now() - totalStart).toFixed(1);
  msg.innerText = 'Batch ok: ' + statements.length + ' statements in ' + totalMs + 'ms';
  if (shouldRefresh) loadTables(false);
}

async function runSqlText(sql, resetPage = true, options = {}) {
  sql = sql.trim();
  if (!sql) return;
  const statements = options.batchSelection ? splitSqlStatements(sql) : [];
  if (statements.length > 1) {
    if (resetPage || sql !== lastSql) currentPage = 0;
    lastSql = sql;
    const pageSize = Math.max(1, Math.min(100000, Number(document.getElementById('pageSize').value) || 100));
    return runSqlBatch(statements, pageSize);
  }
  if (resetPage || sql !== lastSql) currentPage = 0;
  lastSql = sql;
  const pageSize = Math.max(1, Math.min(100000, Number(document.getElementById('pageSize').value) || 100));
  const t0 = performance.now();
  const data = await postSql(sql, currentPage, pageSize);
  const ms = (performance.now() - t0).toFixed(1);
  const msg = document.getElementById('msg');
  const refreshTables = shouldRefreshTables(sql);
  if (!data.success) {
    msg.innerText = 'Error: ' + data.msg;
    return;
  }
  document.getElementById('pageLabel').innerText = 'Page ' + (currentPage + 1);
  msg.innerText = data.msg + ' in ' + ms + 'ms';
  const tbl = document.getElementById('tbl');
  if (!data.columns.length) {
    hideExplainResult();
    tbl.innerHTML = '';
    if (refreshTables) loadTables(false);
    return;
  }
  if (isExplainResult(data)) {
    renderExplainResult(data);
    if (refreshTables) loadTables(false);
    return;
  }
  hideExplainResult();
  let html = '<thead><tr>' + data.columns.map(c => '<th>' + escapeHtml(c.name) + '</th>').join('') + '</tr></thead><tbody>';
  for (const row of data.rows) {
    html += '<tr>' + row.map(v => '<td>' + escapeHtml(v) + '</td>').join('') + '</tr>';
  }
  html += '</tbody>';
  tbl.innerHTML = html;
  if (refreshTables) loadTables(false);
}

function nextPage() {
  currentPage += 1;
  run(false);
}

function prevPage() {
  if (currentPage === 0) return;
  currentPage -= 1;
  run(false);
}

async function saveSnapshot() {
  const button = document.getElementById('snapshotButton');
  const t0 = performance.now();
  button.disabled = true;
  button.setAttribute('aria-busy', 'true');
  try {
    const resp = await fetch('/snapshot', { method: 'POST' });
    const data = await resp.json();
    const ms = (performance.now() - t0).toFixed(1);
    const msg = document.getElementById('msg');
    msg.innerText = (data.success ? data.msg : 'Error: ' + data.msg) + ' in ' + ms + 'ms';
  } finally {
    button.disabled = false;
    button.removeAttribute('aria-busy');
  }
}

async function openParquetImportDialog() {
  const dialog = document.getElementById('parquetImportDialog');
  const root = document.getElementById('parquetImportRoot');
  document.getElementById('parquetImportMsg').innerText = '';
  document.getElementById('parquetImportSource').value = '.';
  document.getElementById('parquetImportSchema').value = 'main';
  document.getElementById('parquetImportTable').value = '';
  root.innerText = 'Loading...';
  dialog.hidden = false;
  try {
    const resp = await fetch('/parquet-import');
    const data = await resp.json();
    root.innerText = data.success ? data.root : data.msg;
  } catch (error) {
    root.innerText = 'Failed to load Parquet import root';
  }
  document.getElementById('parquetImportSource').focus();
}

function closeParquetImportDialog() {
  if (document.getElementById('parquetImportSubmit').disabled) return;
  document.getElementById('parquetImportDialog').hidden = true;
}

function closeParquetImportFromBackdrop(event) {
  if (event.target === event.currentTarget) closeParquetImportDialog();
}

async function submitParquetImport(event) {
  event.preventDefault();
  const submit = document.getElementById('parquetImportSubmit');
  const message = document.getElementById('parquetImportMsg');
  const table = document.getElementById('parquetImportTable').value.trim();
  const payload = {
    source: document.getElementById('parquetImportSource').value.trim(),
    schema: document.getElementById('parquetImportSchema').value.trim(),
    table: table || null
  };
  submit.disabled = true;
  message.innerText = '';
  try {
    const resp = await fetch('/parquet-import', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await resp.json();
    if (!data.success) {
      message.innerText = data.msg || 'Parquet import failed';
      return;
    }
    document.getElementById('msg').innerText = data.msg;
    document.getElementById('parquetImportDialog').hidden = true;
    await loadTables();
  } catch (error) {
    message.innerText = 'Parquet import request failed';
  } finally {
    submit.disabled = false;
  }
}

function setEditorHeight(height) {
  const main = document.querySelector('.main');
  const bounds = main.getBoundingClientRect();
  const topbar = document.querySelector('.topbar').offsetHeight;
  const pager = document.querySelector('.pager').offsetHeight;
  const splitter = document.getElementById('editorSplitter').offsetHeight;
  const minEditor = 150;
  const minResult = 160;
  const maxEditor = Math.max(minEditor, bounds.height - topbar - pager - splitter - minResult);
  const nextHeight = Math.max(minEditor, Math.min(maxEditor, height));
  main.style.setProperty('--editor-height', nextHeight + 'px');
  localStorage.setItem(editorHeightKey, String(Math.round(nextHeight)));
}

function setupEditorSplitter() {
  const main = document.querySelector('.main');
  const splitter = document.getElementById('editorSplitter');
  const savedHeight = Number(localStorage.getItem(editorHeightKey));
  if (Number.isFinite(savedHeight) && savedHeight > 0) {
    setEditorHeight(savedHeight);
  }

  splitter.addEventListener('pointerdown', event => {
    event.preventDefault();
    splitter.setPointerCapture(event.pointerId);
    splitter.classList.add('dragging');
    document.body.classList.add('resizing');

    const onMove = moveEvent => {
      const bounds = main.getBoundingClientRect();
      const topbar = document.querySelector('.topbar').offsetHeight;
      setEditorHeight(moveEvent.clientY - bounds.top - topbar);
    };

    const onUp = upEvent => {
      splitter.releasePointerCapture(upEvent.pointerId);
      splitter.classList.remove('dragging');
      document.body.classList.remove('resizing');
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('pointercancel', onUp);
    };

    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    window.addEventListener('pointercancel', onUp);
  });

  window.addEventListener('resize', () => {
    const currentHeight = document.querySelector('.editor').getBoundingClientRect().height;
    setEditorHeight(currentHeight);
  });
}

window.addEventListener('keydown', event => {
  const dialog = document.getElementById('parquetImportDialog');
  if (event.key === 'Escape' && !dialog.hidden) closeParquetImportDialog();
});

initSession();

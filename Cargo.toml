[package]
name = "rsduck"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = { version = "0.8", features = ["macros"] }
pgwire = "0.26"
tokio-postgres = { version = "0.7", features = ["runtime", "with-chrono-0_4"] }
duckdb = { version = "1", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
chrono = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "local-time"] }
async-trait = "0.1"
anyhow = "1"
futures = "0.3"

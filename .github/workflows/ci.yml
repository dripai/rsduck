name: CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
    paths-ignore:
      - "**/*.md"
      - "doc/**"
      - "*.png"
      - "*.jpg"
      - "*.jpeg"
      - "*.gif"
      - "*.svg"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "doc/**"
      - "*.png"
      - "*.jpg"
      - "*.jpeg"
      - "*.gif"
      - "*.svg"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            binary_path: target/release/rsduck.exe
            binary_name: rsduck.exe
            asset_name: rsduck-windows-x64.zip
          - name: Linux x64
            os: ubuntu-latest
            binary_path: target/release/rsduck
            binary_name: rsduck
            asset_name: rsduck-linux-x64.tar.gz
          - name: macOS arm64
            os: macos-latest
            binary_path: target/release/rsduck
            binary_name: rsduck
            asset_name: rsduck-macos-arm64.tar.gz
          - name: macOS x64
            os: macos-15-intel
            binary_path: target/release/rsduck
            binary_name: rsduck
            asset_name: rsduck-macos-x64.tar.gz

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal

      - name: Use stable Rust
        run: rustup default stable

      - name: Install Rust formatter
        run: rustup component add rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Package release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "${{ matrix.binary_path }}" "dist/${{ matrix.binary_name }}"
          if ("${{ runner.os }}" -eq "Windows") {
            Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "dist/${{ matrix.asset_name }}"
          } else {
            tar -czf "dist/${{ matrix.asset_name }}" -C dist "${{ matrix.binary_name }}"
          }

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: release-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
